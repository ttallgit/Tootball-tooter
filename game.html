<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tootball Tooter - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <span class="game-title">TOOTBALL TOOTER</span>
            <span class="mode-badge" id="mode-badge">NORMAL</span>
            <button class="back-btn" id="back-btn">BACK</button>
        </div>

        <canvas id="game-canvas" width="800" height="600"></canvas>

        <div class="game-over-overlay" id="game-over" style="display: none;">
            <h2 id="result-title">GAME OVER</h2>
            <p class="score" id="final-score">Score: 0 / 5</p>
            <div id="shot-details" class="shot-details"></div>
            <div class="game-over-buttons">
                <button id="play-again-btn">PLAY AGAIN</button>
                <button id="menu-btn">MAIN MENU</button>
            </div>
        </div>

        <div class="scroll-overlay" id="scroll-overlay" style="display: none;">
            <div class="scroll-content">
                <p class="scroll-text" id="scroll-text"></p>
                <button class="scroll-close-btn" id="scroll-close-btn">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/goalkeeper.js"></script>
    <script src="js/ball.js"></script>
    <script src="js/game.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const gameOver = document.getElementById('game-over');
            const playAgainBtn = document.getElementById('play-again-btn');
            const menuBtn = document.getElementById('menu-btn');
            const backBtn = document.getElementById('back-btn');
            const modeBadge = document.getElementById('mode-badge');

            const tigerData = JSON.parse(localStorage.getItem('selectedTiger'));
            const gameMode = localStorage.getItem('gameMode') || 'normal';

            if (!tigerData) {
                window.location.href = 'index.html';
                return;
            }

            GAME_SETTINGS.hardMode = gameMode === 'hard';
            if (GAME_SETTINGS.hardMode) {
                GAME_SETTINGS.keeperLearningRate = 0.55;
                GAME_SETTINGS.keeperNoise = 0.08;
                GAME_SETTINGS.keeperReachH = 82;
                GAME_SETTINGS.aimJitter = 0.6;
                GAME_SETTINGS.aimingTimeLimit = 3000;
            }
            modeBadge.textContent = gameMode.toUpperCase();

            audioManager.init();

            const game = new Game(canvas);
            game.start(tigerData);

            playAgainBtn.addEventListener('click', () => {
                gameOver.style.display = 'none';
                game.start(tigerData);
            });

            menuBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            backBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            const scrollCloseBtn = document.getElementById('scroll-close-btn');
            const scrollOverlay = document.getElementById('scroll-overlay');
            scrollCloseBtn.addEventListener('click', () => {
                scrollOverlay.style.display = 'none';
            });
        });
    </script>
</body>
</html>
