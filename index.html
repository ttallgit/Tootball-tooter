<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tootball Tooter - Tiger Selection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>TOOTBALL TOOTER</h1>
        <h2>PENALTY SHOOTOUT</h2>

        <div class="mode-selection">
            <p class="subtitle">SELECT MODE</p>
            <div class="mode-buttons">
                <button class="mode-btn selected" id="normal-btn" data-mode="normal">NORMAL</button>
                <button class="mode-btn" id="hard-btn" data-mode="hard">HARD</button>
            </div>
            <p class="mode-desc" id="mode-desc">Arrow shows LEFT or RIGHT. Shoot the opposite way!</p>
        </div>

        <p class="subtitle">CHOOSE YOUR TIGER</p>
        <div class="tiger-grid" id="tiger-grid"></div>

        <button class="start-btn" id="start-btn" disabled>START GAME</button>

        <div class="instructions">
            <p>↑ : RUN FORWARD &nbsp; | &nbsp; ← → ↓ : AIM &nbsp; | &nbsp; SPACE : SHOOT</p>
            <p>PRESS DIRECTION + SPACE AT THE SAME TIME TO SHOOT!</p>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
